<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReshiVer | R6 Directory</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            /* DARK THEME */
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --header-bg: rgba(15, 15, 15, 0.8);
            --brand-orange: #ff9800; 
            --brand-orange-deep: #e65100;
            --text: #e0e0e0;
            --text-dim: #ff9800; 
            --glass-border: rgba(255, 255, 255, 0.1);
            --viewer-bg: #111;
            --snow-color: rgba(255, 255, 255, 0.5);
        }

        [data-theme="light"] {
            /* LIGHT THEME */
            --bg: #f4f4f5;
            --card-bg: #ffffff;
            --header-bg: rgba(255, 255, 255, 0.8);
            --text: #111827;
            --text-dim: #e65100;
            --glass-border: rgba(0, 0, 0, 0.1);
            --viewer-bg: #dcdcdc;
            --snow-color: rgba(0, 0, 0, 0.8);
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); overflow-x: hidden; transition: background 0.3s; }
        #snow-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        
        header {
            padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 100; background: var(--header-bg);
        }

        .logo {
            font-size: 1.5rem; font-weight: 900; letter-spacing: 2px;
            background: linear-gradient(45deg, var(--brand-orange), #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; padding: 40px; }
        
        .model-card { 
            background: var(--card-bg); border-radius: 12px; overflow: hidden; 
            border: 1px solid var(--glass-border); transition: transform 0.2s;
        }
        .model-card:hover { transform: translateY(-5px); }

        .viewer-container { width: 100%; height: 350px; background: var(--viewer-bg); cursor: grab; }
        .viewer-container:active { cursor: grabbing; }

        .card-meta { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn { 
            padding: 8px 16px; border-radius: 6px; border: 1px solid var(--glass-border);
            background: var(--brand-orange); color: white; cursor: pointer; font-weight: bold;
        }

        #auth-user-display { color: var(--brand-orange); font-weight: 800; margin-right: 15px; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal { background: var(--card-bg); padding: 30px; border-radius: 15px; width: 400px; text-align: center; }
        .modal input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--glass-border); background: #000; color: #fff; box-sizing: border-box; }
    </style>
</head>
<body>

<canvas id="snow-canvas"></canvas>

<header>
    <div class="logo">RESHIVER</div>
    <div class="btn-group">
        <span id="auth-user-display"></span>
        <button class="btn" style="background:none;" onclick="toggleTheme()">🌓</button>
        <button class="btn" onclick="openAuthModal()" id="btn-login">Login</button>
        <button class="btn" onclick="requireAuth(() => openUploader('r6'))">Upload R6</button>
    </div>
</header>

<div id="gallery"></div>

<div id="auth-modal" class="modal-overlay">
    <div class="modal">
        <h2 style="color: var(--brand-orange)">ReshiVer Access</h2>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-password" placeholder="Password">
        <button class="btn" style="width:100%" onclick="handleAuth()">Enter Vault</button>
        <button class="btn" style="background:none; margin-top:10px;" onclick="closeModal('auth-modal')">Close</button>
    </div>
</div>

<input type="file" id="file-input-r6" hidden accept=".mesh" multiple>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient('https://ygvxsqirzprzbryamqrp.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlndnhzcWlyenByemJyeWFtcXJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNDU3MDUsImV4cCI6MjA5MjYyMTcwNX0.RFRiaWifidtKJmiCxXnZ8-NKnPvkX9SQ15DXMA1dT6E');

    let currentUser = null;
    const viewers = [];
    const texLoader = new THREE.TextureLoader();

    // --- SNOW ---
    const canvas = document.getElementById('snow-canvas');
    const ctx = canvas.getContext('2d');
    let flakes = [];
    function initSnow() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        flakes = Array.from({length: 100}, () => ({x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2+1, s: Math.random()+1}));
    }
    function drawSnow() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--snow-color');
        flakes.forEach(f => {
            ctx.beginPath(); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2); ctx.fill();
            f.y += f.s; if(f.y > canvas.height) f.y = -5;
        });
        requestAnimationFrame(drawSnow);
    }
    initSnow(); drawSnow();

    // --- THEME ---
    window.toggleTheme = () => {
        const mode = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', mode);
    };

    // --- 3D ENGINE (PRO LIGHTING & MATERIALS) ---
    function initThree(container, data, isR6) {
        const scene = new THREE.Scene();
        const cam = new THREE.PerspectiveCamera(40, container.clientWidth/container.clientHeight, 0.1, 1000);
        const ren = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        ren.setPixelRatio(window.devicePixelRatio);
        ren.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(ren.domElement);

        const con = new OrbitControls(cam, ren.domElement);
        con.enableDamping = true;

        // 1. Image Based Lighting (Fake Environment)
        const gen = new THREE.PMREMGenerator(ren);
        scene.environment = gen.fromScene(new THREE.Scene()).texture;

        // 2. Main Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const sun = new THREE.DirectionalLight(0xffffff, 2.5);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        const headLight = new THREE.PointLight(0xffffff, 1.5);
        scene.add(headLight);

        // 3. Material (PBR Standard)
        const proMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xbbbbbb,
            metalness: 0.2,
            roughness: 0.5,
            envMapIntensity: 1.0
        });

        if (isR6) {
            const group = new THREE.Group();
            const off = { torso:[0,0,0], leftarm:[-1.5,0,0], rightarm:[1.5,0,0], leftleg:[-0.5,-2,0], rightleg:[0.5,-2,0] };
            Object.entries(data).forEach(([k,v]) => {
                if(!v) return;
                const m = new THREE.Mesh(v.geo, proMaterial);
                m.position.set(...off[k]);
                group.add(m);
            });
            scene.add(group);
            cam.position.set(0, 1, 12);
        } else {
            const m = new THREE.Mesh(data, proMaterial);
            data.computeBoundingBox();
            const center = new THREE.Vector3();
            data.boundingBox.getCenter(center);
            m.position.sub(center); // Auto-center
            scene.add(m);
            cam.position.set(0, 0, 7);
        }

        viewers.push({ scene, cam, ren, con, headLight });
    }

    function animate() {
        requestAnimationFrame(animate);
        viewers.forEach(v => { 
            v.con.update(); 
            v.headLight.position.copy(v.cam.position); // Light follows user view
            v.ren.render(v.scene, v.cam); 
        });
    }
    animate();

    // --- PRO ROBLOX MESH PARSER (WITH UVs) ---
    function parseRoblox(buf) {
        const dv = new DataView(buf); const u8 = new Uint8Array(buf);
        let h = 0; for(let i=0; i<u8.length; i++) if(u8[i] === 10) { h = i+1; break; }
        
        const vSize = dv.getUint8(h+2); // Usually 36 or 40
        const vCount = dv.getUint32(h+4, true);
        const fCount = dv.getUint32(h+8, true);
        
        const pos = [], uvs = [], idx = [];
        const vStart = h + 12;
        const iStart = vStart + (vCount * vSize);

        for(let i=0; i<vCount; i++) {
            const b = vStart + (i * vSize);
            // Positions
            pos.push(dv.getFloat32(b, true), dv.getFloat32(b+4, true), dv.getFloat32(b+8, true));
            // UVs (at byte offset 24 for most v2 meshes)
            if (vSize >= 32) {
                uvs.push(dv.getFloat32(b+24, true), 1 - dv.getFloat32(b+28, true));
            }
        }

        for(let i=0; i<fCount*3; i++) idx.push(dv.getUint32(iStart + (i*4), true));

        const g = new THREE.BufferGeometry();
        g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        if(uvs.length) g.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
        g.setIndex(idx);
        g.computeVertexNormals();
        return g;
    }

    // --- DB & UI ---
    async function fetchGallery() {
        const { data } = await supabase.from('posts').select('*').order('id', {ascending:false});
        const g = document.getElementById('gallery'); g.innerHTML = "";
        data?.forEach(item => {
            const card = document.createElement('div'); card.className = 'model-card';
            const vDiv = document.createElement('div'); vDiv.className = 'viewer-container';
            card.innerHTML = `<div class="card-meta"><div><b>${item.name}</b><br><small>@${item.creator}</small></div><button class="btn" onclick="window.open('${item.zip_url}')">GET</button></div>`;
            card.prepend(vDiv); g.appendChild(card);
            loadModel(item, vDiv);
        });
    }

    async function loadModel(item, container) {
        try {
            const res = await fetch(item.zip_url);
            const zip = await JSZip.loadAsync(await res.blob());
            if(item.is_r6) {
                const parts = {};
                for(const fn of Object.keys(zip.files)) {
                    const geo = parseRoblox(await zip.files[fn].async("arraybuffer"));
                    const n = fn.toLowerCase();
                    if(n.includes('torso')) parts.torso = {geo}; else if(n.includes('arm')) n.includes('left') ? parts.leftarm={geo} : parts.rightarm={geo};
                    else if(n.includes('leg')) n.includes('left') ? parts.leftleg={geo} : parts.rightleg={geo};
                }
                initThree(container, parts, true);
            } else {
                const geo = parseRoblox(await zip.files[Object.keys(zip.files)[0]].async("arraybuffer"));
                initThree(container, geo, false);
            }
        } catch(e) { container.innerHTML = "Model Lost"; }
    }

    // Auth helpers
    window.openAuthModal = () => document.getElementById('auth-modal').style.display='flex';
    window.closeModal = (id) => document.getElementById(id).style.display='none';
    window.handleAuth = async () => {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        await supabase.auth.signInWithPassword({email, password});
        location.reload();
    };

    supabase.auth.onAuthStateChange((_e, session) => {
        currentUser = session?.user;
        if(currentUser) {
            document.getElementById('auth-user-display').innerText = currentUser.email.split('@')[0];
            document.getElementById('btn-login').style.display = 'none';
        }
    });

    fetchGallery();
</script>
</body>
</html>
