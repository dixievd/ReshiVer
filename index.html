<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReshiVer | R6 Directory</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            /* DARK THEME (Default) */
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --header-bg: rgba(15, 15, 15, 0.8);
            --accent: #ff8c00; 
            --accent-glow: rgba(255, 140, 0, 0.3); 
            --text: #e0e0e0;
            --text-dim: #ff9800;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --danger: #ff4444;
            --viewer-bg: #222;
            --input-bg: #000;
        }

        [data-theme="light"] {
            /* LIGHT THEME */
            --bg: #f4f4f5;
            --card-bg: #ffffff;
            --header-bg: rgba(255, 255, 255, 0.8);
            --accent: #ff6600; 
            --accent-glow: rgba(255, 102, 0, 0.3); 
            --text: #111827;
            --text-dim: #e65100;
            --glass: rgba(0, 0, 0, 0.05);
            --glass-border: rgba(0, 0, 0, 0.1);
            --viewer-bg: #e5e5e5;
            --input-bg: #f9f9f9;
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body.locked { overflow: hidden; }

        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50; 
        }

        header {
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--header-bg);
            transition: background-color 0.3s ease;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--text), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-group { display: flex; gap: 15px; align-items: center; }

        .btn {
            padding: 10px 24px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: var(--glass);
            color: var(--text);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            border: none;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
            border: none;
        }

        .btn:hover { transform: translateY(-2px); border-color: var(--accent); }
        .btn-danger:hover { border-color: #ff0000; box-shadow: 0 0 10px rgba(255, 68, 68, 0.4); }
        
        .btn-text { background: transparent; border: none; color: var(--text-dim); }
        .btn-text:hover { color: var(--accent); transform: none; border: none; }
        
        .theme-toggle { padding: 10px; border-radius: 50%; width: 42px; height: 42px; display: flex; justify-content: center; align-items: center; }

        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 30px;
            padding: 60px;
            position: relative;
            z-index: 60;
        }

        .model-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            animation: fadeIn 0.5s ease forwards;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .viewer-container {
            width: 100%;
            height: 320px;
            background: var(--viewer-bg);
            position: relative;
            transition: background-color 0.3s ease;
        }

        .card-meta {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .meta-info h3 { margin: 0; font-size: 1.1rem; }
        .meta-info p { margin: 5px 0 0; font-size: 0.8rem; color: var(--text-dim); }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: var(--card-bg);
            width: 450px;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            text-align: center;
            transition: background-color 0.3s ease;
        }

        .modal input {
            width: 100%;
            padding: 15px;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
            margin: 10px 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .error-msg { color: var(--danger); font-size: 0.9rem; margin-top: 10px; display: none; }
        #auth-user-display { color: var(--accent); font-weight: bold; font-size: 0.9rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="locked">

<canvas id="snow-canvas"></canvas>

<div id="age-gate" class="modal-overlay" style="display: flex; z-index: 9999;">
    <div class="modal">
        <h2>Age Verification</h2>
        <p style="color: var(--text-dim); margin-bottom: 20px;">You must be 18 years of age or older to access ReshiVer.</p>
        <button class="btn btn-primary" style="width: 100%;" onclick="verifyAge()">I am 18 or older</button>
        <button class="btn btn-text" style="width: 100%; margin-top: 10px;" onclick="window.location.href='https://google.com'">Leave Site</button>
    </div>
</div>

<header>
    <div class="logo">RESHIVER</div>
    <div class="btn-group">
        <button class="btn theme-toggle" onclick="toggleTheme()" id="theme-btn">☀️</button>
        <span id="auth-user-display" style="display: none;"></span>
        <button class="btn" id="btn-login" onclick="openAuthModal()">Login / Register</button>
        <button class="btn" id="btn-logout" style="display: none;" onclick="handleLogout()">Logout</button>
        <button class="btn" onclick="requireAuth(() => openUploader('r6'))">Post R6</button>
        <button class="btn" onclick="requireAuth(() => openUploader('single'))">Post Single</button>
    </div>
</header>

<div id="gallery"></div>

<div id="modal-overlay" class="modal-overlay">
    <div class="modal">
        <h2 id="modal-title">Publish Model</h2>
        <input type="text" id="model-name-input" placeholder="Model Name (Folder Name)">
        <input type="text" id="creator-name-input" placeholder="Creator Name (Admin Override)" style="display: none;">
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn" style="flex: 1" onclick="closeModal('modal-overlay')">Cancel</button>
            <button class="btn btn-primary" style="flex: 1" onclick="finalizePublish()">Publish Now</button>
        </div>
    </div>
</div>

<div id="auth-modal" class="modal-overlay">
    <div class="modal">
        <h2 id="auth-title">Welcome Back</h2>
        <input type="text" id="auth-nickname" placeholder="Nickname" style="display: none;">
        <input type="email" id="auth-email" placeholder="Email Address">
        <input type="password" id="auth-password" placeholder="Password">
        <p id="auth-error" class="error-msg"></p>
        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">
            <button class="btn btn-primary" id="auth-action-btn" onclick="handleAuth()">Login</button>
            <button class="btn btn-text" id="auth-toggle-btn" onclick="toggleAuthMode()">Need an account? Register</button>
            <button class="btn" onclick="closeModal('auth-modal')">Cancel</button>
        </div>
    </div>
</div>

<input type="file" id="file-input-single" hidden accept=".mesh" multiple>
<input type="file" id="file-input-r6" hidden accept=".mesh" multiple>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // Administrator Settings - Change this to the email of your site admin
    const ADMIN_EMAIL = 'reeilick@gmail.com';

    // Initialize Supabase
    const supabaseUrl = 'https://ygvxsqirzprzbryamqrp.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlndnhzcWlyenByemJyeWFtcXJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNDU3MDUsImV4cCI6MjA5MjYyMTcwNX0.RFRiaWifidtKJmiCxXnZ8-NKnPvkX9SQ15DXMA1dT6E';
    const supabase = createClient(supabaseUrl, supabaseKey);

    let pendingFiles = [];
    let currentMode = 'single';
    let currentUser = null;
    let isRegisterMode = false;
    const viewers = [];

    // --- THEME SYSTEM ---
    window.toggleTheme = () => {
        const isLight = document.body.getAttribute('data-theme') === 'light';
        document.body.setAttribute('data-theme', isLight ? 'dark' : 'light');
        document.getElementById('theme-btn').innerText = isLight ? '☀️' : '🌙';
        localStorage.setItem('theme', isLight ? 'dark' : 'light');
    };

    if (localStorage.getItem('theme') === 'light') {
        document.body.setAttribute('data-theme', 'light');
        document.getElementById('theme-btn').innerText = '🌙';
    }

    // --- AGE GATE SYSTEM ---
    window.verifyAge = () => {
        localStorage.setItem('ageVerified', 'true');
        document.getElementById('age-gate').style.display = 'none';
        document.body.classList.remove('locked');
    };

    if (localStorage.getItem('ageVerified') === 'true') {
        document.getElementById('age-gate').style.display = 'none';
        document.body.classList.remove('locked');
    }

    // --- AUTH SYSTEM ---
    supabase.auth.getSession().then(({ data: { session } }) => {
        currentUser = session?.user || null;
        updateUI();
        fetchGallery(); // Re-fetch to apply deletion permissions if state changes
    });

    supabase.auth.onAuthStateChange((_event, session) => {
        currentUser = session?.user || null;
        updateUI();
        fetchGallery(); // Re-fetch to apply deletion permissions if state changes
    });

    function updateUI() {
        const loginBtn = document.getElementById('btn-login');
        const logoutBtn = document.getElementById('btn-logout');
        const userDisplay = document.getElementById('auth-user-display');

        if (currentUser) {
            loginBtn.style.display = 'none';
            logoutBtn.style.display = 'block';
            userDisplay.style.display = 'block';
            // Display registered nickname, fallback to email prefix
            userDisplay.innerText = currentUser.user_metadata?.nickname || currentUser.email.split('@')[0]; 
        } else {
            loginBtn.style.display = 'block';
            logoutBtn.style.display = 'none';
            userDisplay.style.display = 'none';
        }
    }

    window.requireAuth = (actionCallback) => {
        if (currentUser) {
            actionCallback();
        } else {
            openAuthModal();
        }
    };

    window.openAuthModal = () => {
        document.getElementById('auth-error').style.display = 'none';
        document.getElementById('auth-modal').style.display = 'flex';
    };

    window.toggleAuthMode = () => {
        isRegisterMode = !isRegisterMode;
        document.getElementById('auth-title').innerText = isRegisterMode ? "Create Account" : "Welcome Back";
        document.getElementById('auth-action-btn').innerText = isRegisterMode ? "Register" : "Login";
        document.getElementById('auth-toggle-btn').innerText = isRegisterMode ? "Already have an account? Login" : "Need an account? Register";
        
        // Show nickname field only on register
        document.getElementById('auth-nickname').style.display = isRegisterMode ? 'block' : 'none';
    };

    window.handleAuth = async () => {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        const nickname = document.getElementById('auth-nickname').value;
        const errorEl = document.getElementById('auth-error');
        
        if (!email || !password || (isRegisterMode && !nickname)) {
            errorEl.innerText = "Please fill in all required fields.";
            errorEl.style.display = 'block';
            return;
        }

        let result;
        if (isRegisterMode) {
            result = await supabase.auth.signUp({ 
                email, 
                password,
                options: { data: { nickname: nickname } }
            });
        } else {
            result = await supabase.auth.signInWithPassword({ email, password });
        }

        if (result.error) {
            errorEl.innerText = result.error.message;
            errorEl.style.display = 'block';
        } else {
            closeModal('auth-modal');
            document.getElementById('auth-email').value = "";
            document.getElementById('auth-password').value = "";
            document.getElementById('auth-nickname').value = "";
        }
    };

    window.handleLogout = async () => {
        await supabase.auth.signOut();
    };

    // --- UPLOAD / UI SYSTEM ---
    window.closeModal = (id) => {
        document.getElementById(id).style.display = 'none';
        pendingFiles = [];
    };

    window.openUploader = (mode) => {
        currentMode = mode;
        const input = document.getElementById(mode === 'single' ? 'file-input-single' : 'file-input-r6');
        input.value = ""; 
        input.click();
    };

    document.getElementById('file-input-single').onchange = e => handleSelection(e.target.files);
    document.getElementById('file-input-r6').onchange = e => handleSelection(e.target.files);

    function handleSelection(files) {
        if (files.length === 0) return;
        pendingFiles = Array.from(files);
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('modal-title').innerText = "Publish Model";

        // Admin override view for Creator Name
        const creatorInput = document.getElementById('creator-name-input');
        if (currentUser && currentUser.email === ADMIN_EMAIL) {
            creatorInput.style.display = 'block';
            creatorInput.value = currentUser.user_metadata?.nickname || currentUser.email.split('@')[0];
        } else {
            creatorInput.style.display = 'none';
        }
    }

    // --- FETCH & PUBLISH ---
    async function fetchGallery() {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = "<p style='text-align:center; width:100%; grid-column:1/-1; color:var(--text-dim);'>Loading global models...</p>";
        
        const { data, error } = await supabase.from('posts').select('*').order('id', { ascending: false });
        if (error) {
            gallery.innerHTML = "<p style='color:var(--danger);'>Failed to load models. Check Supabase DB Policies.</p>";
            return;
        }
        
        gallery.innerHTML = "";
        if (data.length === 0) gallery.innerHTML = "<p style='text-align:center; grid-column:1/-1; color:var(--text);'>Vault is empty. Be the first to post!</p>";
        
        for (const item of data) createCardFromCloud(item);
    }

    window.finalizePublish = async () => {
        const name = document.getElementById('model-name-input').value || "Unnamed Model";
        const titleEl = document.getElementById('modal-title');
        
        // Use user's nickname by default
        let creator = currentUser.user_metadata?.nickname || currentUser.email.split('@')[0];
        // Allow admin override
        if (currentUser && currentUser.email === ADMIN_EMAIL) {
            creator = document.getElementById('creator-name-input').value || creator;
        }

        titleEl.innerText = "Uploading to Vault... ⏳";

        try {
            let zipBlob;
            let fileName = `${Date.now()}_${name.replace(/[^a-z0-9]/gi, '_')}.zip`;

            const zip = new JSZip();
            if (currentMode === 'single') {
                zip.file(pendingFiles[0].name, await pendingFiles[0].arrayBuffer());
            } else {
                const r6Data = await processR6FilesLocal(pendingFiles);
                Object.values(r6Data).forEach(p => zip.file(p.originalName, p.buffer));
            }
            zipBlob = await zip.generateAsync({ type: "blob" });

            const { error: storageError } = await supabase.storage.from('meshes').upload(fileName, zipBlob);
            if (storageError) throw storageError;

            const { data: urlData } = supabase.storage.from('meshes').getPublicUrl(fileName);

            const { error: dbError } = await supabase.from('posts').insert([{
                name: name,
                creator: creator,
                author_email: currentUser.email, // Save author email to verify deletion rights
                zip_url: urlData.publicUrl,
                is_r6: currentMode === 'r6'
            }]);

            if (dbError) throw dbError;

            closeModal('modal-overlay');
            document.getElementById('model-name-input').value = "";
            fetchGallery(); 

        } catch (err) {
            alert("Upload failed: " + err.message);
            titleEl.innerText = "Publish Model";
        }
    };

    // --- CLOUD RENDERER ---
    async function createCardFromCloud(item) {
        const card = document.createElement('div');
        card.className = 'model-card';
        const viewerDiv = document.createElement('div');
        viewerDiv.className = 'viewer-container';
        viewerDiv.innerHTML = '<div style="color:var(--text-dim); display:flex; justify-content:center; align-items:center; height:100%;">Loading 3D...</div>';
        
        const meta = document.createElement('div');
        meta.className = 'card-meta';
        meta.innerHTML = `<div class="meta-info"><h3>${item.name}</h3><p>by ${item.creator}</p></div>`;
        
        const actionContainer = document.createElement('div');
        actionContainer.style.display = 'flex';
        actionContainer.style.gap = '10px';

        const dlBtn = document.createElement('button');
        dlBtn.className = 'btn';
        dlBtn.innerText = 'Download .zip';
        dlBtn.onclick = () => {
            requireAuth(() => {
                const a = document.createElement('a');
                a.href = item.zip_url;
                a.download = `${item.name}.zip`;
                a.click();
            });
        };
        actionContainer.appendChild(dlBtn);

        // Delete button logic (Only Admin or Original Author)
        const isAuthor = currentUser && (
            item.author_email === currentUser.email || 
            item.creator === (currentUser.user_metadata?.nickname || currentUser.email.split('@')[0])
        );
        const isAdmin = currentUser && currentUser.email === ADMIN_EMAIL;

        if (isAuthor || isAdmin) {
            const delBtn = document.createElement('button');
            delBtn.className = 'btn btn-danger';
            delBtn.innerText = 'Delete';
            delBtn.onclick = async () => {
                if(!confirm(`Are you sure you want to delete ${item.name}? This cannot be undone.`)) return;
                
                // Remove Database Entry
                const { error: dbDelError } = await supabase.from('posts').delete().eq('id', item.id);
                
                if(!dbDelError) {
                    // Attempt Storage Cleanup (Fails silently if missing)
                    try {
                        const urlObj = new URL(item.zip_url);
                        const paths = urlObj.pathname.split('/');
                        const fileName = paths[paths.length - 1];
                        await supabase.storage.from('meshes').remove([fileName]);
                    } catch(e) { console.log('Storage cleanup skipped', e) }
                    
                    fetchGallery(); // Refresh view
                } else {
                    alert("Failed to delete post: " + dbDelError.message);
                }
            };
            actionContainer.appendChild(delBtn);
        }
        
        meta.appendChild(actionContainer);
        card.append(viewerDiv, meta);
        document.getElementById('gallery').appendChild(card);

        try {
            const response = await fetch(item.zip_url);
            const blob = await response.blob();
            const zip = await JSZip.loadAsync(blob);
            viewerDiv.innerHTML = ""; 

            if (item.is_r6) {
                const parts = {};
                for (const filename of Object.keys(zip.files)) {
                    const fileData = await zip.files[filename].async("arraybuffer");
                    const geo = parseRoblox(fileData);
                    const n = filename.toLowerCase();
                    if (n.includes('torso')) parts.torso = { geo };
                    else if (n.includes('leftarm')) parts.leftarm = { geo };
                    else if (n.includes('rightarm')) parts.rightarm = { geo };
                    else if (n.includes('leftleg')) parts.leftleg = { geo };
                    else if (n.includes('rightleg')) parts.rightleg = { geo };
                }
                initThree(viewerDiv, parts, true);
            } else {
                const filename = Object.keys(zip.files)[0];
                const fileData = await zip.files[filename].async("arraybuffer");
                const geo = parseRoblox(fileData);
                initThree(viewerDiv, geo, false);
            }
        } catch (e) {
            viewerDiv.innerHTML = '<div style="color:var(--danger); display:flex; justify-content:center; align-items:center; height:100%;">Preview Unavailable</div>';
        }
    }

    // --- UTILS & THREE.JS ---
    async function processR6FilesLocal(files) {
        const parts = { torso: null, leftarm: null, rightarm: null, leftleg: null, rightleg: null };
        for (const file of files) {
            const n = file.name.toLowerCase();
            const buffer = await file.arrayBuffer();
            const partInfo = { buffer, originalName: file.name };
            if (n.includes('torso')) parts.torso = partInfo;
            else if (n.includes('leftarm')) parts.leftarm = partInfo;
            else if (n.includes('rightarm')) parts.rightarm = partInfo;
            else if (n.includes('leftleg')) parts.leftleg = partInfo;
            else if (n.includes('rightleg')) parts.rightleg = partInfo;
        }
        return parts;
    }

    function parseRoblox(buf) {
        const dv = new DataView(buf); const u8 = new Uint8Array(buf);
        let h = 0; for(let i=0; i<u8.length; i++) { if(u8[i] === 10) { h = i+1; break; } }
        const vS = dv.getUint8(h + 2), vC = dv.getUint32(h + 4, true), fC = dv.getUint32(h + 8, true);
        const vO = h + 12, iO = vO + (vC * vS);
        const pos = []; for(let i=0; i<vC; i++) { const b = vO + (i * vS); pos.push(dv.getFloat32(b, true), dv.getFloat32(b+4, true), dv.getFloat32(b+8, true)); }
        const idx = []; for(let i=0; i<fC*3; i++) idx.push(dv.getUint32(iO + (i*4), true));
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        geo.setIndex(idx); geo.computeVertexNormals();
        return geo;
    }

    function initThree(container, data, isR6) {
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0xffffff, 0.7)); 
        const headLight = new THREE.DirectionalLight(0xffffff, 0.8);
        scene.add(headLight);

        const material = new THREE.MeshPhongMaterial({ color: 0x999999, specular: 0x222222, shininess: 30 });

        if (isR6) {
            const group = new THREE.Group();
            const offsets = { torso:[0,0,0], leftarm:[-1.5,0,0], rightarm:[1.5,0,0], leftleg:[-0.5,-2,0], rightleg:[0.5,-2,0] };
            Object.entries(data).forEach(([key, val]) => {
                if(!val || !val.geo) return;
                val.geo.computeBoundingBox();
                const center = new THREE.Vector3(); val.geo.boundingBox.getCenter(center);
                val.geo.translate(-center.x, -center.y, -center.z);
                const m = new THREE.Mesh(val.geo, material);
                m.position.set(...offsets[key]);
                group.add(m);
            });
            group.rotation.y = Math.PI + (Math.PI / 4); 
            scene.add(group);
            camera.position.set(0, 2, 10);
        } else {
            data.computeBoundingBox();
            const center = new THREE.Vector3(); data.boundingBox.getCenter(center);
            const m = new THREE.Mesh(data, material);
            m.position.sub(center);
            m.rotation.y = Math.PI + (Math.PI / 4);
            scene.add(m);
            camera.position.set(0, 0, 6);
        }

        viewers.push({ scene, camera, renderer, controls, headLight });
    }

    function animate() {
        requestAnimationFrame(animate);
        viewers.forEach(v => { 
            v.controls.update(); 
            v.headLight.position.copy(v.camera.position);
            v.renderer.render(v.scene, v.camera); 
        });
    }
    animate();
</script>

<script>
    // --- SNOWFALL EFFECT ---
    const canvas = document.getElementById('snow-canvas');
    const ctx = canvas.getContext('2d');
    
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    });

    // Create particles
    const snowflakes = Array.from({ length: 150 }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        r: Math.random() * 3 + 1, // radius
        speedX: Math.random() * 1 - 0.5,
        speedY: Math.random() * 2 + 1,
        opacity: Math.random() * 0.5 + 0.2
    }));

    function renderSnow() {
        ctx.clearRect(0, 0, width, height);
        
        snowflakes.forEach(flake => {
            ctx.beginPath();
            ctx.arc(flake.x, flake.y, flake.r, 0, Math.PI * 2);
            
            // Setting the snow to be universally white for both Dark and Light theme
            ctx.fillStyle = `rgba(255, 255, 255, ${flake.opacity})`; 
            ctx.fill();

            // Move the snowflake
            flake.y += flake.speedY;
            flake.x += flake.speedX;

            // Reset snowflake to top when it falls off screen
            if (flake.y > height) {
                flake.y = -10;
                flake.x = Math.random() * width;
            }
        });
        
        requestAnimationFrame(renderSnow);
    }
    
    renderSnow();
</script>
